apiVersion: v1
kind: ServiceAccount
metadata:
  name: backend-sa
  namespace: k8s-test-app
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: backend-role
  namespace: k8s-test-app
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: backend-rb
  namespace: k8s-test-app
subjects:
  - kind: ServiceAccount
    name: backend-sa
    namespace: k8s-test-app
roleRef:
  kind: Role
  name: backend-role
  apiGroup: rbac.authorization.k8s.io
